server:
  port: 0

spring:
  profiles:
    active: demo

logging:
  file:
    name: application.log

possable:
  security:
    api-key: "changeme-api-key"
    bearer-token-secret: "changeme-bearer-secret"

app:
  auth:
    pincode: "1234"
    inactivity-timeout-ms: 300000
  docs:
    enabled: false

# Management/Actuator settings for Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always 