server:
  port: 8080

spring:
  profiles:
    active: prod
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true

vaadin:
  productionMode: true

logging:
  file:
    name: application.log

possable:
  security:
    api-key: "changeme-api-key"
    bearer-token-secret: "changeme-bearer-secret"

app:
  auth:
    pincode: "1234"
    inactivity-timeout-ms: 300000
  docs:
    enabled: false
  seed:
    user:
      enable: true
    inventory:
      enable: true
    print:
      enable: true
    order:
      enable: true

# Management/Actuator settings for Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always 