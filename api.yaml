openapi: 3.1.0
info:
  title: Simple Restaurant POS API
  description: API spec for a simple SaaS restaurant Point of Sale system. Supports auth token and secret, with monthly usage limits.
  version: 1.0.0
servers:
  - url: https://api.yourpossaas.com/v1
    description: Production server

components:
  responses:
    BadRequestError:
      description: Bad request (validation or client error)
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              details:
                type: object
          examples:
            sample:
              summary: Bad request example
              value:
                error: "invalid_input"
                details:
                  field: "quantity"
                  reason: "must be positive"
    UnauthorizedError:
      description: Unauthorized - authentication required or failed
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              message:
                type: string
          examples:
            sample:
              summary: Unauthorized example
              value:
                error: "unauthorized"
                message: "Missing or invalid credentials"
    ForbiddenError:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              message:
                type: string
          examples:
            sample:
              summary: Forbidden example
              value:
                error: "forbidden"
                message: "Insufficient permissions"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
          examples:
            sample:
              summary: Not found example
              value:
                error: "not_found"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              traceId:
                type: string
          examples:
            sample:
              summary: Internal error example
              value:
                error: "internal_error"
                traceId: "abc123"

  examples:
    ApiKeyHeader:
      summary: Example usage of X-API-KEY header
      value:
        X-API-KEY: "your-api-key-here"
    BearerAuthHeader:
      summary: Example usage of Authorization header with Bearer token
      value:
        Authorization: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVC..."

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
      description: "API Key (auth secret) to identify the client."
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Bearer token for user authentication and authorization."

  schemas:
    Item:
      type: object
      required:
        - id
        - name
        - price
      properties:
        id:
          type: string
          example: "item123"
        name:
          type: string
          example: "Margherita Pizza"
        description:
          type: string
          example: "Classic tomato, mozzarella, basil"
        price:
          type: number
          format: float
          example: 12.5
        available:
          type: boolean
          default: true

    OrderItem:
      type: object
      required:
        - itemId
        - quantity
      properties:
        itemId:
          type: string
          example: "item123"
        quantity:
          type: integer
          example: 2

    Order:
      type: object
      required:
        - id
        - items
        - totalAmount
        - status
      properties:
        id:
          type: string
          example: "order456"
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        totalAmount:
          type: number
          format: float
          example: 25.0
        status:
          type: string
          enum: [pending, completed, canceled]
          example: pending
        createdAt:
          type: string
          format: date-time

    Employee:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          example: "emp789"
        name:
          type: string
          example: "John Doe"
        role:
          type: string
          example: "Waiter"
        active:
          type: boolean
          default: true

    Payment:
      type: object
      required:
        - id
        - orderId
        - amount
        - method
        - status
      properties:
        id:
          type: string
          example: "pay001"
        orderId:
          type: string
          example: "order456"
        amount:
          type: number
          format: float
          example: 25.0
        method:
          type: string
          enum: [cash, card, tap]
          example: card
        status:
          type: string
          enum: [pending, completed, failed]
          example: completed
        paidAt:
          type: string
          format: date-time

    Printer:
      type: object
      required:
        - id
        - name
        - category
      properties:
        id:
          type: string
          example: "printer1"
        name:
          type: string
          example: "Oven Printer #1"
        category:
          type: string
          example: "oven"
        description:
          type: string
          example: "Printer near the pizza oven"

    PrintTemplate:
      type: object
      required:
        - id
        - printerCategory
        - templateName
        - content
      properties:
        id:
          type: string
          example: "template_oven_1"
        printerCategory:
          type: string
          example: "oven"
          description: "Category of printer this template is for"
        templateName:
          type: string
          example: "Oven Order Simple"
          description: "Human-readable template name"
        content:
          type: string
          example: "{{orderNumber}} - {{items}}"
          description: "Template content, using a placeholder syntax"

    PrintJob:
      type: object
      required:
        - id
        - orderId
        - printerId
        - templateId
        - status
      properties:
        id:
          type: string
          example: "printjob_123"
        orderId:
          type: string
          example: "order456"
          description: "Order id associated with this print job"
        printerId:
          type: string
          example: "printer1"
          description: "Target printer for this print job"
        templateId:
          type: string
          example: "template_oven_1"
          description: "Template used for this print"
        status:
          type: string
          enum: [pending, printing, completed, failed]
          example: pending
        createdAt:
          type: string
          format: date-time

    # Paged response wrappers
    PagedItem:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          example: 235
        totalPages:
          type: integer
          example: 12

    PagedOrder:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          example: 235
        totalPages:
          type: integer
          example: 12

    PagedPrintJob:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PrintJob'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 100
        totalElements:
          type: integer
          example: 235
        totalPages:
          type: integer
          example: 3

  parameters:
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
      description: Max number of items per page (pagination)
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Page index (0-based) for pagination

security:
  - ApiKeyAuth: []
  - BearerAuth: []

paths:
  /items:
    get:
      summary: List menu items
      description: Get a paged list of menu items.
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Paged list of items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedItem'
              examples:
                sample:
                  summary: Example paged items response
                  value:
                    items:
                      - id: "item123"
                        name: "Margherita Pizza"
                        description: "Classic tomato, mozzarella, basil"
                        price: 12.5
                        available: true
                      - id: "item456"
                        name: "Latte"
                        description: "Milky coffee"
                        price: 3.5
                        available: true
                    page: 0
                    size: 20
                    totalElements: 2
                    totalPages: 1
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - ApiKeyAuth: []

    post:
      summary: Create a new menu item
      requestBody:
        description: Item object to add
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
              examples:
                created:
                  summary: Created item example
                  value:
                    id: "item789"
                    name: "Espresso"
                    description: "Strong black coffee"
                    price: 2.5
                    available: true
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /items/{itemId}:
    get:
      summary: Get item details
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Item details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - ApiKeyAuth: []

    put:
      summary: Update an item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: Updated item object
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      responses:
        '200':
          description: Item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

    delete:
      summary: Delete an item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Item deleted
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /orders:
    post:
      summary: Place a new order
      requestBody:
        required: true
        description: Order details
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/OrderItem'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              examples:
                created:
                  summary: Created order example
                  value:
                    id: "order001"
                    items:
                      - itemId: "item123"
                        quantity: 1
                      - itemId: "item456"
                        quantity: 1
                    totalAmount: 15.0
                    status: pending
                    createdAt: "2025-09-27T12:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - ApiKeyAuth: []

    get:
      summary: List recent orders
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Paged list of orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedOrder'
              examples:
                sample:
                  summary: Paged orders example
                  value:
                    items:
                      - id: "order001"
                        items:
                          - itemId: "item123"
                            quantity: 1
                        totalAmount: 12.5
                        status: pending
                        createdAt: "2025-09-27T12:00:00Z"
                    page: 0
                    size: 20
                    totalElements: 1
                    totalPages: 1
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - ApiKeyAuth: []

  /orders/{orderId}:
    get:
      summary: Get order details
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
      security:
        - ApiKeyAuth: []

    put:
      summary: Update order status (e.g. complete or cancel)
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: Updated order status
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [pending, completed, canceled]
      responses:
        '200':
          description: Order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
      security:
        - BearerAuth: []

  /employees:
    get:
      summary: List employees
      parameters:
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Employee list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Employee'
              examples:
                sample:
                  summary: Employee list example
                  value:
                    - id: "emp001"
                      name: "Alice"
                      role: "Waiter"
                      active: true
                    - id: "emp002"
                      name: "Bob"
                      role: "Chef"
                      active: true
      security:
        - BearerAuth: []

    post:
      summary: Add new employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
      responses:
        '201':
          description: Employee created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
              examples:
                created:
                  summary: Created employee example
                  value:
                    id: "emp003"
                    name: "Charlie"
                    role: "Barista"
                    active: true
      security:
        - BearerAuth: []

  /payments:
    post:
      summary: Record a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Payment'
      responses:
        '201':
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
              examples:
                created:
                  summary: Payment example
                  value:
                    id: "pay001"
                    orderId: "order001"
                    amount: 15.0
                    method: card
                    status: completed
                    paidAt: "2025-09-27T12:05:00Z"
      security:
        - ApiKeyAuth: []

    get:
      summary: Get payment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
              examples:
                sample:
                  summary: Payment sample
                  value:
                    id: "pay001"
                    orderId: "order001"
                    amount: 15.0
                    method: card
                    status: completed
                    paidAt: "2025-09-27T12:05:00Z"
      security:
        - ApiKeyAuth: []

  /usage:
    get:
      summary: Get current API usage and limits
      responses:
        '200':
          description: Usage details
          content:
            application/json:
              schema:
                type: object
                properties:
                  monthlyLimit:
                    type: integer
                    example: 100000
                  requestsMade:
                    type: integer
                    example: 10500
                  resetDate:
                    type: string
                    format: date-time
              examples:
                sample:
                  summary: Usage example
                  value:
                    monthlyLimit: 100000
                    requestsMade: 10500
                    resetDate: "2025-10-01T00:00:00Z"
      security:
        - ApiKeyAuth: []

  /printers:
    get:
      summary: List all printers
      responses:
        '200':
          description: List of registered printers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Printer'
              examples:
                sample:
                  summary: Printers list example
                  value:
                    - id: "printer123"
                      name: "Kitchen Printer"
                      category: "kitchen"
                      description: "Main kitchen order printer"
      security:
        - BearerAuth: []

    post:
      summary: Register a new printer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Printer'
      responses:
        '201':
          description: Printer registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Printer'
              examples:
                created:
                  summary: Registered printer example
                  value:
                    id: "printer123"
                    name: "Kitchen Printer"
                    category: "kitchen"
                    description: "Main kitchen order printer"
      security:
        - BearerAuth: []

  /print-templates:
    get:
      summary: List print templates
      responses:
        '200':
          description: List of print templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PrintTemplate'
              examples:
                sample:
                  summary: Print templates list example
                  value:
                    - id: "template_oven_1"
                      printerCategory: "kitchen"
                      templateName: "kitchen-default"
                      content: "KITCHEN\nOrder: {{orderId}}\nItems: {{items}}"
      security:
        - BearerAuth: []

    post:
      summary: Create a new print template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrintTemplate'
      responses:
        '201':
          description: Print template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrintTemplate'
              examples:
                created:
                  summary: Print template example
                  value:
                    id: "template_oven_1"
                    printerCategory: "kitchen"
                    templateName: "kitchen-default"
                    content: "KITCHEN\nOrder: {{orderId}}\nItems: {{items}}\nNotes: {{notes}}"
      security:
        - BearerAuth: []

  /print-jobs:
    post:
      summary: Create print jobs for an order
      description: Create print jobs targeting specific printers with templates for an order.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orderId
                - jobs
              properties:
                orderId:
                  type: string
                  example: "order456"
                jobs:
                  type: array
                  items:
                    type: object
                    required:
                      - printerId
                      - templateId
                    properties:
                      printerId:
                        type: string
                        example: "printer1"
                      templateId:
                        type: string
                        example: "template_oven_1"
      responses:
        '201':
          description: Print jobs created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PrintJob'
              examples:
                created:
                  summary: Print jobs created example
                  value:
                    - id: "pj-1"
                      orderId: "order001"
                      printerId: "printer123"
                      templateId: "template_oven_1"
                      status: pending
                      createdAt: "2025-09-27T12:10:00Z"
      security:
        - ApiKeyAuth: []

    get:
      summary: List print jobs with optional filters by order or status
      parameters:
        - name: orderId
          in: query
          schema:
            type: string
          description: Filter jobs by order ID
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, printing, completed, failed]
          description: Filter jobs by print status
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paged list of print jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedPrintJob'
              examples:
                sample:
                  summary: Paged print jobs example
                  value:
                    items:
                      - id: "pj-1"
                        orderId: "order001"
                        printerId: "printer123"
                        templateId: "template_oven_1"
                        status: pending
                        createdAt: "2025-09-27T12:10:00Z"
                    page: 0
                    size: 100
                    totalElements: 1
                    totalPages: 1
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - ApiKeyAuth: []

    put:
      summary: Update print job status
      parameters:
        - name: printJobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [pending, printing, completed, failed]
      responses:
        '200':
          description: Print job status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrintJob'
      security:
        - BearerAuth: []

  /api/auth/login:
    post:
      summary: Login using PIN or drawing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                pincode:
                  type: string
                drawing:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  roles:
                    type: array
                    items:
                      type: string
              examples:
                success:
                  summary: Successful login example
                  value:
                    ok: true
                    roles:
                      - SERVICE
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security: []

  /api/auth/register:
    post:
      summary: Register a new user (management only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                pincode:
                  type: string
                drawing:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: User registered
          content:
            application/json:
              examples:
                created:
                  summary: User added
                  value:
                    ok: true
        '400':
          description: Bad request
          content:
            application/json:
              examples:
                failed:
                  summary: Failed register
                  value:
                    ok: false
      security:
        - BearerAuth: []

  /health:
    get:
